name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://medical_crm:medical_crm@localhost:5432/medical_crm?schema=public
      JWT_SECRET: ci-secret-at-least-32-characters-long
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medical_crm
          POSTGRES_PASSWORD: medical_crm
          POSTGRES_DB: medical_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medical_crm -d medical_crm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

