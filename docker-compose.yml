services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medical_crm
      POSTGRES_PASSWORD: medical_crm
      POSTGRES_DB: medical_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_crm -d medical_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

